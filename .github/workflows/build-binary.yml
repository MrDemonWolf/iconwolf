name: Build Binary

on:
  release:
    types: [published]

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install

      - name: Build release
        working-directory: packages/iconwolf
        run: bash scripts/build-release.sh macos-arm64

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            packages/iconwolf/dist-bin/iconwolf-macos-arm64.tar.gz \
            --clobber
