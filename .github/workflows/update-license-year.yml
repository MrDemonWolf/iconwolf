name: Update License Year

on:
  schedule:
    # Jan 1 at 00:00 CST (06:00 UTC)
    - cron: '0 6 1 1 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-year:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update license year
        run: |
          CURRENT_YEAR=$(date +%Y)
          sed -i "s/Copyright (c) [0-9]\{4\}/Copyright (c) $CURRENT_YEAR/" LICENSE

      - name: Commit and push if changed
        run: |
          git diff --quiet LICENSE && echo "License year already up to date" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LICENSE
          git commit -m "chore: update license year to $(date +%Y)"
          git push
